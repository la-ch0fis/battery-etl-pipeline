AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Battery ETL Pipeline — EventBridge → Lambda → Step Functions → Glue → S3 → Iceberg

# ──────────────────────────────────────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────────────────────────────────────
Parameters:
  ProjectName:
    Type: String
    Default: battery-etl
    Description: Prefix for all resource names

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  ScheduleExpression:
    Type: String
    Default: "cron(0 13 ? * MON-FRI *)"
    Description: "EventBridge cron/rate expression — e.g. rate(1 day) or cron(0 6 * * ? *)"

  GlueDatabase:
    Type: String
    Default: battery_etl_db

  IcebergTable:
    Type: String
    Default: battery_results

# ──────────────────────────────────────────────────────────────────────────────
# Globals
# ──────────────────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures: [arm64]

# ──────────────────────────────────────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────────────────────────────────────
Resources:

  # ── S3 Buckets ────────────────────────────────────────────────────────────

  RawDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-raw-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ProcessedDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-processed-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  IcebergBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-iceberg-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-scripts-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Glue Data Catalog Database ────────────────────────────────────────────

  GlueCatalogDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref GlueDatabase
        Description: !Sub "Battery ETL Iceberg database (${Environment})"

  # ── IAM Roles ─────────────────────────────────────────────────────────────

  GlueJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-glue-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RawDataBucket.Arn
                  - !Sub "${RawDataBucket.Arn}/*"
                  - !GetAtt ProcessedDataBucket.Arn
                  - !Sub "${ProcessedDataBucket.Arn}/*"
                  - !GetAtt IcebergBucket.Arn
                  - !Sub "${IcebergBucket.Arn}/*"
                  - !GetAtt GlueScriptsBucket.Arn
                  - !Sub "${GlueScriptsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:CreateDatabase
                  - glue:GetTable
                  - glue:CreateTable
                  - glue:UpdateTable
                  - glue:DeleteTable
                  - glue:GetPartition
                  - glue:CreatePartition
                  - glue:UpdatePartition
                  - glue:BatchCreatePartition
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/*"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StartStepFunction
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: states:StartExecution
                Resource: !Ref ETLStateMachine

  StepFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-sfn-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub "states.${AWS::Region}.amazonaws.com"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StepFunctionGlueAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - glue:StartJobRun
                  - glue:GetJobRun
                  - glue:GetJobRuns
                  - glue:BatchStopJobRun
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                  - logs:GetLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutLogEvents
                  - logs:PutResourcePolicy
                  - logs:UpdateLogDelivery
                Resource: "*"
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: "*"

  # ── Step Function State Machine ───────────────────────────────────────────

  ETLStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "${ProjectName}-pipeline-${Environment}"
      DefinitionUri: statemachine/etl_pipeline.asl.json
      DefinitionSubstitutions:
        ETLJobName: !Ref ETLTransformJob
        IcebergJobName: !Ref IcebergJob
        GlueDatabase: !Ref GlueDatabase
        IcebergTable: !Ref IcebergTable
      Role: !GetAtt StepFunctionRole.Arn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt StateMachineLogGroup.Arn
        IncludeExecutionData: true
        Level: ALL
      Tracing:
        Enabled: true

  StateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/${ProjectName}-pipeline-${Environment}"
      RetentionInDays: 30

  # ── Lambda Function ───────────────────────────────────────────────────────

  StartETLFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-start-etl-${Environment}"
      CodeUri: src/lambda/start_etl/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref ETLStateMachine
          RAW_BUCKET: !Ref RawDataBucket
          PROCESSED_BUCKET: !Ref ProcessedDataBucket
          ICEBERG_BUCKET: !Ref IcebergBucket
      Events:
        ETLSchedule:
          Type: Schedule
          Properties:
            Name: !Sub "${ProjectName}-schedule-${Environment}"
            Schedule: !Ref ScheduleExpression
            Description: "Triggers the Battery ETL pipeline on a schedule"
            Enabled: true

  # ── Glue Jobs ─────────────────────────────────────────────────────────────

  ETLTransformJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub "${ProjectName}-etl-transform-${Environment}"
      Description: "Filters and transforms battery14_df.csv data, joins with degrees.csv, writes Parquet"
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: "4.0"
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${GlueScriptsBucket}/scripts/etl_job.py"
        PythonVersion: "3"
      DefaultArguments:
        "--job-bookmark-option": "job-bookmark-disable"
        "--enable-metrics": "true"
        "--enable-continuous-cloudwatch-log": "true"
        "--enable-glue-datacatalog": "true"
        "--TempDir": !Sub "s3://${GlueScriptsBucket}/tmp/"
      WorkerType: G.1X
      NumberOfWorkers: 2
      Timeout: 60
      MaxRetries: 0
      ExecutionProperty:
        MaxConcurrentRuns: 1

  IcebergJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub "${ProjectName}-iceberg-${Environment}"
      Description: "Reads transformed Parquet data and creates an Iceberg table in Glue Data Catalog"
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: "4.0"
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${GlueScriptsBucket}/scripts/iceberg_job.py"
        PythonVersion: "3"
      DefaultArguments:
        "--job-bookmark-option": "job-bookmark-disable"
        "--enable-metrics": "true"
        "--enable-continuous-cloudwatch-log": "true"
        "--enable-glue-datacatalog": "true"
        "--datalake-formats": "iceberg"
        "--conf": !Sub >-
          spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
          --conf spark.sql.catalog.glue_catalog=org.apache.iceberg.spark.SparkCatalog
          --conf spark.sql.catalog.glue_catalog.catalog-impl=org.apache.iceberg.aws.glue.GlueCatalog
          --conf spark.sql.catalog.glue_catalog.warehouse=s3://${ProjectName}-iceberg-${AWS::AccountId}/warehouse/
          --conf spark.sql.catalog.glue_catalog.io-impl=org.apache.iceberg.aws.s3.S3FileIO
        "--TempDir": !Sub "s3://${GlueScriptsBucket}/tmp/"
      WorkerType: G.1X
      NumberOfWorkers: 2
      Timeout: 60
      MaxRetries: 0
      ExecutionProperty:
        MaxConcurrentRuns: 1

# ──────────────────────────────────────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────────────────────────────────────
Outputs:
  RawDataBucketName:
    Description: "Upload battery14_df.csv and degrees.csv here"
    Value: !Ref RawDataBucket
    Export:
      Name: !Sub "${ProjectName}-raw-bucket"

  ProcessedDataBucketName:
    Description: "Transformed Parquet output"
    Value: !Ref ProcessedDataBucket
    Export:
      Name: !Sub "${ProjectName}-processed-bucket"

  IcebergBucketName:
    Description: "Iceberg table warehouse root"
    Value: !Ref IcebergBucket
    Export:
      Name: !Sub "${ProjectName}-iceberg-bucket"

  GlueScriptsBucketName:
    Description: "Upload Glue PySpark scripts here before running the pipeline"
    Value: !Ref GlueScriptsBucket
    Export:
      Name: !Sub "${ProjectName}-scripts-bucket"

  StateMachineArn:
    Description: "Step Function State Machine ARN"
    Value: !Ref ETLStateMachine
    Export:
      Name: !Sub "${ProjectName}-state-machine-arn"

  StartETLFunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt StartETLFunction.Arn
    Export:
      Name: !Sub "${ProjectName}-lambda-arn"

  GlueDatabaseName:
    Description: "Glue Data Catalog database"
    Value: !Ref GlueCatalogDatabase
    Export:
      Name: !Sub "${ProjectName}-glue-db"
